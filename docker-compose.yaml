version: '3.8'

services:

  # Zafiyetli Web Paneli
  web_panel:
    build: ./web_panel
    ports:
      - "5000:5000"
    volumes:
      - ./web_panel:/app
    environment:
      SECURITY_MODE: VULNERABLE   # SECURE veya VULNERABLE
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Zafiyetli Araç Kontrol Servisi
  # Zafiyet 1: SSH açık, şifre zayıf (root:1234)
  # Zafiyet 2: Port 444 kimlik doğrulamasız hız kontrol soketi
  vehicle_controller:
    build: ./vehicle_controller
    ports:
      - "2222:22"    # SSH — ransomware saldırısı
      - "444:444"    # Hız kontrol soketi — speed spoof saldırısı
    container_name: vehicle_controller
    environment:
      SECURITY_MODE: VULNERABLE   # SECURE veya VULNERABLE
    extra_hosts:
      - "host.docker.internal:host-gateway"